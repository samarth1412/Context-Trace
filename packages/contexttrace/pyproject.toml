[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "contexttrace"
version = "0.1.0"
description = "Python SDK for ContextTrace RAG reliability tracing."
requires-python = ">=3.8"
dependencies = [
    "httpx>=0.27",
    "typing-extensions>=4.9",
]

[project.scripts]
contexttrace = "contexttrace.cli:main"

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.2",
]
llamaindex = [
    "llama-index-core>=0.10",
]
fastapi = [
    "fastapi>=0.110",
]
langgraph = [
    "langgraph>=0.2",
]
opentelemetry = [
    "opentelemetry-api>=1.24",
]
integrations = [
    "fastapi>=0.110",
    "langchain-core>=0.2",
    "langgraph>=0.2",
    "llama-index-core>=0.10",
    "opentelemetry-api>=1.24",
]
test = [
    "pytest>=8.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["contexttrace*"]
