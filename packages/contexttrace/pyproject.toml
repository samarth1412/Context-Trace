[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "contexttrace"
version = "1.0.0"
description = "Local-first evidence-chain debugger for RAG and AI agent claim grounding, citation checks, root-cause diagnosis, and regression tests."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
    { name = "ContextTrace contributors" },
]
keywords = [
    "rag",
    "llm",
    "retrieval-augmented-generation",
    "citations",
    "evaluation",
    "observability",
    "agents",
    "cli",
    "sqlite",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "typing-extensions>=4.9",
]

[project.urls]
Homepage = "https://github.com/samarth1412/Context-Trace"
Documentation = "https://github.com/samarth1412/Context-Trace/tree/main/docs"
Repository = "https://github.com/samarth1412/Context-Trace"
Issues = "https://github.com/samarth1412/Context-Trace/issues"
Changelog = "https://github.com/samarth1412/Context-Trace/blob/main/CHANGELOG.md"

[project.scripts]
contexttrace = "contexttrace.cli:main"

[project.optional-dependencies]
langchain = [
    "langchain-core>=0.2",
]
llamaindex = [
    "llama-index-core>=0.10",
]
local = []
local-ml = [
    "sentence-transformers>=2.7",
]
nli = [
    "torch>=2.0",
    "transformers>=4.41",
]
nli-onnx = [
    "onnxruntime>=1.17",
    "transformers>=4.41",
]
fastapi = [
    "fastapi>=0.110",
]
langgraph = [
    "langgraph>=0.2",
]
otel = [
    "opentelemetry-api>=1.24",
]
opentelemetry = [
    "opentelemetry-api>=1.24",
]
integrations = [
    "fastapi>=0.110",
    "langchain-core>=0.2",
    "langgraph>=0.2",
    "llama-index-core>=0.10",
    "opentelemetry-api>=1.24",
]
all = [
    "fastapi>=0.110",
    "langchain-core>=0.2",
    "langgraph>=0.2",
    "llama-index-core>=0.10",
    "opentelemetry-api>=1.24",
    "sentence-transformers>=2.7",
    "torch>=2.0",
    "transformers>=4.41",
    "onnxruntime>=1.17",
]
test = [
    "pytest>=8.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["contexttrace*"]

[tool.setuptools.package-data]
contexttrace = ["py.typed", "verify/*.json"]
