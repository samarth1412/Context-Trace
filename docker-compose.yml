services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: contexttrace
      POSTGRES_USER: contexttrace
      POSTGRES_PASSWORD: contexttrace
    ports:
      - "5432:5432"
    volumes:
      - contexttrace_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contexttrace -d contexttrace"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - contexttrace_qdrant:/qdrant/storage

volumes:
  contexttrace_postgres:
  contexttrace_qdrant:
