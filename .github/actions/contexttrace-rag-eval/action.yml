name: ContextTrace RAG Eval
description: Run ContextTrace local CLI eval or benchmark and upload a local HTML report.
inputs:
  dataset_path:
    description: Path to eval questions or demo dataset.
    required: true
  endpoint_url:
    description: Optional RAG endpoint URL. When omitted, the action runs local benchmark mode.
    required: false
    default: ""
  fail_on:
    description: Newline-separated threshold rules such as failure_rate>0.25.
    required: false
    default: ""
  report_path:
    description: HTML report output path.
    required: false
    default: .contexttrace/reports/contexttrace-report.html
  openai_api_key:
    description: Optional OpenAI-compatible judge API key.
    required: false
    default: ""
  judge_provider:
    description: Optional judge provider name.
    required: false
    default: local
outputs:
  questions_tested:
    description: Number of questions evaluated.
    value: ${{ steps.metrics.outputs.questions_tested }}
  reliability_score:
    description: Reliability score from the run.
    value: ${{ steps.metrics.outputs.reliability_score }}
  failure_rate:
    description: Failure rate from the run.
    value: ${{ steps.metrics.outputs.failure_rate }}
  citation_support:
    description: Citation support from the run.
    value: ${{ steps.metrics.outputs.citation_support }}
  unsupported_claim_rate:
    description: Unsupported claim rate from the run.
    value: ${{ steps.metrics.outputs.unsupported_claim_rate }}
  report_path:
    description: HTML report path.
    value: ${{ inputs.report_path }}
runs:
  using: composite
  steps:
    - name: Install ContextTrace
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "packages/contexttrace/pyproject.toml" ]; then
          python -m pip install -e "packages/contexttrace"
        else
          python -m pip install contexttrace
        fi

    - name: Run ContextTrace
      id: run
      shell: bash
      env:
        CONTEXTTRACE_API_KEY: ${{ inputs.openai_api_key }}
        CONTEXTTRACE_JUDGE_PROVIDER: ${{ inputs.judge_provider }}
      run: |
        set -uo pipefail
        mkdir -p "$(dirname "${{ inputs.report_path }}")"
        FAIL_ARGS=()
        while IFS= read -r rule; do
          if [ -n "$rule" ]; then
            FAIL_ARGS+=(--fail-on "$rule")
          fi
        done <<< "${{ inputs.fail_on }}"

        if [ -n "${{ inputs.endpoint_url }}" ]; then
          set +e
          contexttrace eval \
            --dataset "${{ inputs.dataset_path }}" \
            --endpoint "${{ inputs.endpoint_url }}" \
            --report-path "${{ inputs.report_path }}" \
            --results-path ".contexttrace/contexttrace-results.json" \
            --summary-path ".contexttrace/contexttrace-summary.md" \
            "${FAIL_ARGS[@]}"
          EXIT_CODE=$?
        else
          set +e
          contexttrace benchmark \
            --dataset "${{ inputs.dataset_path }}" \
            --report-path "${{ inputs.report_path }}" \
            --output-dir ".contexttrace/benchmark" \
            "${FAIL_ARGS[@]}"
          EXIT_CODE=$?
          cp ".contexttrace/benchmark/benchmark_results.json" ".contexttrace/contexttrace-results.json"
          cp ".contexttrace/benchmark/benchmark_summary.md" ".contexttrace/contexttrace-summary.md"
        fi
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

    - name: Collect metrics
      id: metrics
      shell: bash
      run: |
        python - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        from pathlib import Path
        data = json.loads(Path(".contexttrace/contexttrace-results.json").read_text())
        summary = data.get("summary") or data
        citation = summary.get("citation_support", summary.get("avg_citation_support", 0))
        top_failures = summary.get("top_failures") or data.get("top_failures") or []
        if isinstance(top_failures, list):
            top_failures = ", ".join(top_failures) or "None"
        print(f"reliability_score={summary.get('reliability_score', 0)}")
        print(f"questions_tested={summary.get('questions_tested', data.get('questions_tested', 0))}")
        print(f"failure_rate={summary.get('failure_rate', 0)}")
        print(f"citation_support={citation}")
        print(f"unsupported_claim_rate={summary.get('unsupported_claim_rate', 0)}")
        print(f"top_failures={top_failures}")
        PY

    - name: Write GitHub summary
      shell: bash
      run: |
        {
          echo "# ContextTrace RAG Eval"
          echo
          echo "- Questions tested: ${{ steps.metrics.outputs.questions_tested }}"
          echo "- Reliability score: ${{ steps.metrics.outputs.reliability_score }}"
          echo "- Failure rate: ${{ steps.metrics.outputs.failure_rate }}"
          echo "- Citation support: ${{ steps.metrics.outputs.citation_support }}"
          echo "- Unsupported claim rate: ${{ steps.metrics.outputs.unsupported_claim_rate }}"
          echo "- Top failures: ${{ steps.metrics.outputs.top_failures }}"
          if [ "${{ steps.run.outputs.exit_code }}" = "0" ]; then
            echo "- Status: pass"
          else
            echo "- Status: fail"
          fi
          echo
          echo "HTML report: \`${{ inputs.report_path }}\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: contexttrace-report
        path: ${{ inputs.report_path }}

    - name: Apply threshold status
      shell: bash
      run: exit "${{ steps.run.outputs.exit_code }}"
