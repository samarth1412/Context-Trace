name: Release Python SDK

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish the built package"
        required: true
        default: "testpypi"
        type: choice
        options:
          - none
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  test:
    name: Test package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/api[test]"
          python -m pip install -e "./packages/contexttrace[test]"

      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/contexttrace

      - name: Smoke install wheel
        run: |
          python -m venv /tmp/contexttrace-smoke
          /tmp/contexttrace-smoke/bin/python -m pip install --upgrade pip
          /tmp/contexttrace-smoke/bin/python -m pip install packages/contexttrace/dist/contexttrace-*.whl
          /tmp/contexttrace-smoke/bin/contexttrace --version
          /tmp/contexttrace-smoke/bin/python -c "from contexttrace import ContextTrace, __version__; print(__version__, ContextTrace)"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contexttrace-dist
          path: packages/contexttrace/dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: inputs.publish_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/contexttrace
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: contexttrace-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: inputs.publish_target == 'pypi'
    environment:
      name: pypi
      url: https://pypi.org/p/contexttrace
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: contexttrace-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
