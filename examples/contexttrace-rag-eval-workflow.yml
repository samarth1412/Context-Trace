name: ContextTrace RAG Eval

on:
  pull_request:
  workflow_dispatch:

jobs:
  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run local ContextTrace benchmark
        uses: ./.github/actions/contexttrace-rag-eval
        with:
          dataset_path: datasets/demo/refund_policy
          fail_on: |
            failure_rate>0.95
            citation_support<0.10
          report_path: .contexttrace/reports/contexttrace-rag-eval.html
